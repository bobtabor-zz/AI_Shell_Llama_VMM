<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Local AI Chat</title>

    <style>
        .json-block {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
            margin-top: 6px;
            font-family: monospace;
            font-size: 13px;
            color: #ddd;
        }

        .json-toggle {
            cursor: pointer;
            color: #4ea1ff;
            font-weight: bold;
            margin-bottom: 4px;
            user-select: none;
        }

        .json-content {
            display: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 6px;
        }


        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 240px;
            background: #181818;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        #newChatBtn {
            padding: 14px;
            background: #0059ff;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            border-radius: 8px;
        }

        #conversations {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .convItem {
            padding: 10px;
            margin-bottom: 8px;
            background: #222;
            border-radius: 6px;
            cursor: pointer;
        }

            .convItem:hover {
                background: #333;
            }

            .convItem.active {
                background: #0059ff;
            }

        /* Chat area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .user {
            background: #0059ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai {
            background: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        #inputBar {
            display: flex;
            padding: 12px;
            background: #222;
            border-top: 1px solid #333;
        }

        #prompt {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: #333;
            color: #eee;
        }

        #send {
            margin-left: 10px;
            padding: 0 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #0059ff;
            color: white;
            cursor: pointer;
        }

            #send:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <button id="newChatBtn">+ New Chat</button>
        <button id="deleteChatBtn" style="
            padding: 14px;
            background: #aa0000;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            border-radius: 8px;">
            Delete Chat
        </button>

        <div id="conversations"></div>
    </div>

    <!-- Main Chat -->
    <div id="main">
        <div id="chat"></div>

        <div id="inputBar">
            <input id="prompt" placeholder="Send a message…" autocomplete="off">
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        /* ------------------------------
           Conversation Persistence
        --------------------------------*/
        let convId = null;
        let conversations = JSON.parse(localStorage.getItem("conversations") || "{}");

        function saveConversations() {
            localStorage.setItem("conversations", JSON.stringify(conversations));
        }

        function createConversation() {
            convId = "conv_" + Date.now();
            conversations[convId] = [];
            saveConversations();
            renderSidebar();
            loadConversation(convId);
        }

        function loadConversation(id) {
            convId = id;
            renderSidebar();

            const chat = document.getElementById("chat");
            chat.innerHTML = "";

            for (const msg of conversations[id]) {
                addMessage(msg.text, msg.role);
            }
        }

        function renderSidebar() {
            const list = document.getElementById("conversations");
            list.innerHTML = "";

            for (const id of Object.keys(conversations)) {
                const div = document.createElement("div");
                div.className = "convItem" + (id === convId ? " active" : "");
                div.textContent = conversations[id][0]?.text?.slice(0, 30) || "New chat";
                div.onclick = () => loadConversation(id);
                list.appendChild(div);
            }
        }

        function deleteConversation() {
            if (!convId) return;

            // Confirm deletion
            if (!confirm("Delete this chat permanently?")) return;

            // Remove from memory
            delete conversations[convId];
            saveConversations();

            const keys = Object.keys(conversations);

            if (keys.length === 0) {
                // No chats left → create a new one
                createConversation();
            } else {
                // Load the first remaining chat
                loadConversation(keys[0]);
            }

            renderSidebar();
        }


        /* ------------------------------
           Chat UI Helpers
        --------------------------------*/
        function addMessage(text, role) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;

            // Start with raw text
            let html = text;

            // 🔥 Extract image URLs anywhere in the text (even inside JSON)
            const urlRegex = /(https?:\/\/\S+\.(?:jpg|jpeg|png|gif))/gi;
            html = html.replace(urlRegex, url => {
                return `<img src="${url}" style="max-width:100%; border-radius:8px; margin:8px 0;">`;
            });

            // Let text wrap naturally
            div.innerHTML = html;

            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = chat.scrollHeight;
        }




        function storeMessage(text, role) {
            conversations[convId].push({ role, text });
            saveConversations();
        }

        /* ------------------------------
           Streaming Fetch
        --------------------------------*/
        async function sendMessage() {
            const promptEl = document.getElementById("prompt");
            const sendBtn = document.getElementById("send");
            const text = promptEl.value.trim();
            if (!text) return;

            addMessage(text, "user");
            storeMessage(text, "user");

            promptEl.value = "";
            sendBtn.disabled = true;

            // Escape Windows backslashes
            const safePrompt = text.replace(/\\/g, "\\\\");

            // Create placeholder AI bubble
            const aiDiv = document.createElement("div");
            aiDiv.className = "msg ai";
            aiDiv.textContent = "";
            chat.appendChild(aiDiv);

            try {
                const res = await fetch("http://localhost:8080/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: safePrompt })
                });

                if (!res.ok) {
                    aiDiv.textContent = "Error " + res.status;
                    return;
                }

                // STREAMING
                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                let full = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    full += chunk;
                    aiDiv.textContent = full;
                    chat.scrollTop = chat.scrollHeight;
                }

                storeMessage(full, "ai");

            } catch (err) {
                aiDiv.textContent = "Connection error";
            }

            sendBtn.disabled = false;
            promptEl.focus();
        }

        /* ------------------------------
           Event Bindings
        --------------------------------*/
        document.getElementById("send").onclick = sendMessage;

        document.getElementById("prompt").addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById("newChatBtn").onclick = createConversation;

        document.getElementById("deleteChatBtn").onclick = deleteConversation;

        /* ------------------------------
           Init
        --------------------------------*/
        if (Object.keys(conversations).length === 0) {
            createConversation();
        } else {
            convId = Object.keys(conversations)[0];
            renderSidebar();
            loadConversation(convId);
        }

    </script>
</body>
</html>
